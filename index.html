<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>봄 (Bom) — Vibe Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
  }

  .header {
    background: #1a1a18;
    color: #f5f4f0;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title { font-size: 18px; font-weight: 500; letter-spacing: .02em; }
  .header-sub { font-size: 12px; color: #888780; margin-top: 2px; }

  .np-bar {
    background: #1a1a18;
    border-top: 0.5px solid #333;
    padding: 12px 20px 16px;
  }
  .np-label {
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    color: #E24B4A; display: flex; align-items: center; gap: 5px; margin-bottom: 6px;
  }
  .np-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #E24B4A;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
  .np-track { font-size: 16px; font-weight: 500; color: #f5f4f0; }
  .np-artist { font-size: 13px; color: #888780; margin-top: 2px; }
  .np-empty { font-size: 14px; color: #555; }

  .chat-wrap {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 140px);
  }

  .msgs {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg { display: flex; gap: 8px; align-items: flex-end; }
  .msg.dj { flex-direction: row-reverse; }
  .msg.sys { justify-content: center; }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; flex-shrink: 0; margin-bottom: 2px;
  }
  .av-guest { background: #EEEDFE; color: #534AB7; }
  .av-dj { background: #1a1a18; color: #f5f4f0; border: 1px solid #444; }

  .bubble-wrap { max-width: 75%; }
  .bubble-name { font-size: 11px; color: #888780; margin-bottom: 3px; }
  .msg.dj .bubble-name { text-align: right; }

  .bubble {
    padding: 10px 13px; font-size: 14px; line-height: 1.55;
    word-break: break-word;
  }
  .bubble-guest {
    background: #fff;
    color: #1a1a18;
    border-radius: 16px 16px 16px 4px;
    border: 0.5px solid #e5e3dc;
  }
  .bubble-dj {
    background: #1a1a18;
    color: #f5f4f0;
    border-radius: 16px 16px 4px 16px;
  }
  .bubble-time { font-size: 11px; color: #aaa; margin-top: 3px; }
  .msg.dj .bubble-time { text-align: right; }

  .sys-bubble {
    font-size: 12px; color: #888;
    background: #eeecea; padding: 5px 14px;
    border-radius: 20px; text-align: center;
  }

  .empty-chat {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #aaa; font-size: 14px; text-align: center; padding: 2rem;
    gap: 8px;
  }
  .empty-icon {
    width: 40px; height: 40px; border-radius: 50%;
    background: #eeecea; display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
  }

  .input-area {
    background: #fff;
    border-top: 0.5px solid #e5e3dc;
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
  }

  .name-row {
    display: flex; gap: 8px; margin-bottom: 8px;
  }
  .name-row input {
    flex: 1; padding: 7px 10px; font-size: 13px;
    border: 0.5px solid #d3d1c7; border-radius: 20px;
    background: #f5f4f0; color: #1a1a18;
    font-family: inherit;
  }
  .name-row input:focus { outline: none; border-color: #888; }
  .name-row select {
    padding: 7px 10px; font-size: 13px;
    border: 0.5px solid #d3d1c7; border-radius: 20px;
    background: #f5f4f0; color: #1a1a18;
    font-family: inherit; cursor: pointer;
  }
  .name-row select:focus { outline: none; }

  .msg-row { display: flex; gap: 8px; align-items: flex-end; }
  .msg-row textarea {
    flex: 1; padding: 9px 13px; font-size: 14px;
    border: 0.5px solid #d3d1c7; border-radius: 20px;
    background: #f5f4f0; color: #1a1a18;
    font-family: inherit; resize: none; line-height: 1.5;
    max-height: 100px;
  }
  .msg-row textarea:focus { outline: none; border-color: #888; }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: #1a1a18; color: #f5f4f0;
    border: none; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .send-btn:active { opacity: .7; }

  .dj-panel {
    display: none;
    background: #1a1a18;
    padding: 12px 16px;
    max-width: 600px;
    margin: 0 auto;
  }
  .dj-panel.open { display: block; }
  .dj-panel-title {
    font-size: 12px; color: #888; text-transform: uppercase;
    letter-spacing: .08em; margin-bottom: 8px;
  }
  .dj-np-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .dj-np-row input {
    flex: 1; padding: 8px 10px; font-size: 13px;
    border: 0.5px solid #444; border-radius: 8px;
    background: #2a2a28; color: #f5f4f0; font-family: inherit;
  }
  .dj-np-row input:focus { outline: none; border-color: #888; }
  .dj-btn {
    padding: 8px 14px; font-size: 13px;
    border: 0.5px solid #444; border-radius: 8px;
    background: transparent; color: #f5f4f0; cursor: pointer;
    font-family: inherit; white-space: nowrap;
  }
  .dj-btn:hover { background: #2a2a28; }
  .dj-btn.red { border-color: #E24B4A; color: #E24B4A; }

  .dj-toggle {
    position: fixed; bottom: 80px; right: 16px;
    width: 44px; height: 44px; border-radius: 50%;
    background: #1a1a18; color: #f5f4f0;
    border: none; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }

  .toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%);
    background: #1a1a18; color: #f5f4f0;
    padding: 8px 20px; border-radius: 20px;
    font-size: 13px; z-index: 200;
    opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">봄 (Bom)</div>
    <div class="header-sub">music bar · vibe chat</div>
  </div>
</div>

<div class="np-bar" id="np-bar">
  <div class="np-label"><span class="np-dot"></span> now playing</div>
  <div id="np-display" class="np-empty">—</div>
</div>

<div class="chat-wrap">
  <div class="msgs" id="msgs">
    <div class="empty-chat" id="empty-msg">
      <div class="empty-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2C5.58 2 2 5.13 2 9c0 2.1 1.03 3.99 2.67 5.29L4 17l2.93-1.46C7.87 15.83 8.92 16 10 16c4.42 0 8-3.13 8-7s-3.58-7-8-7z" fill="#ccc"/>
        </svg>
      </div>
      <span>이 곡의 vibe를 남겨보세요</span>
    </div>
  </div>

  <div class="input-area">
    <div class="name-row">
      <input id="name-inp" placeholder="이름 또는 별칭" maxlength="20" />
      <select id="who-sel" onchange="onWho()">
        <option value="guest">손님</option>
        <option value="dj">DJ 봄</option>
      </select>
    </div>
    <div class="msg-row">
      <textarea id="msg-inp" placeholder="이 곡의 vibe는..." rows="1" onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 8L14 2L9 14L7.5 9L2 8Z" fill="#f5f4f0"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="dj-panel" id="dj-panel">
  <div class="dj-panel-title">DJ 컨트롤</div>
  <div class="dj-np-row">
    <input id="dj-title" placeholder="곡명" />
    <input id="dj-artist" placeholder="아티스트" />
    <button class="dj-btn" onclick="setNP()">Set</button>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="dj-btn red" onclick="clearChat()">채팅 지우기</button>
    <button class="dj-btn" onclick="toggleDJ()">닫기</button>
  </div>
</div>

<button class="dj-toggle" onclick="toggleDJ()" title="DJ 패널">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <circle cx="9" cy="9" r="7" stroke="#f5f4f0" stroke-width="1.2"/>
    <circle cx="9" cy="9" r="2.5" fill="#f5f4f0"/>
  </svg>
</button>

<div class="toast" id="toast"></div>

<script>
var NP = null;
var MSGS = [];

function ts() {
  return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}

function onWho() {
  var who = document.getElementById('who-sel').value;
  var ni = document.getElementById('name-inp');
  var mi = document.getElementById('msg-inp');
  if (who === 'dj') {
    ni.value = 'DJ 봄';
    mi.placeholder = 'DJ 코멘트...';
  } else {
    if (ni.value === 'DJ 봄') ni.value = '';
    mi.placeholder = '이 곡의 vibe는...';
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function setNP() {
  var title = document.getElementById('dj-title').value.trim();
  var artist = document.getElementById('dj-artist').value.trim();
  if (!title || !artist) { showToast('곡명과 아티스트를 입력해주세요'); return; }
  NP = { title: title, artist: artist };
  document.getElementById('dj-title').value = '';
  document.getElementById('dj-artist').value = '';
  renderNP();
  addSys('Now playing: ' + title + ' — ' + artist);
  showToast('곡이 설정됐어요!');
}

function renderNP() {
  var el = document.getElementById('np-display');
  if (!NP) {
    el.className = 'np-empty';
    el.innerHTML = '—';
  } else {
    el.className = '';
    el.innerHTML = '<div class="np-track">' + esc(NP.title) + '</div><div class="np-artist">' + esc(NP.artist) + '</div>';
  }
}

function addSys(text) {
  MSGS.push({ type: 'sys', text: text, time: ts() });
  renderMsgs();
  scrollDown();
}

function sendMsg() {
  var who = document.getElementById('who-sel').value;
  var name = document.getElementById('name-inp').value.trim() || (who === 'dj' ? 'DJ 봄' : '손님');
  var text = document.getElementById('msg-inp').value.trim();
  if (!text) return;
  if (!NP) { showToast('먼저 DJ가 곡을 설정해야 해요'); return; }
  MSGS.push({ type: who, name: name, text: text, time: ts() });
  document.getElementById('msg-inp').value = '';
  document.getElementById('msg-inp').style.height = 'auto';
  renderMsgs();
  scrollDown();
}

function renderMsgs() {
  var el = document.getElementById('msgs');
  var empty = document.getElementById('empty-msg');

  var chatMsgs = MSGS.filter(function(m){ return true; });
  if (!chatMsgs.length) {
    if (!empty) {
      el.innerHTML = '<div class="empty-chat" id="empty-msg"><div class="empty-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2C5.58 2 2 5.13 2 9c0 2.1 1.03 3.99 2.67 5.29L4 17l2.93-1.46C7.87 15.83 8.92 16 10 16c4.42 0 8-3.13 8-7s-3.58-7-8-7z" fill="#ccc"/></svg></div><span>이 곡의 vibe를 남겨보세요</span></div>';
    }
    return;
  }

  el.innerHTML = MSGS.map(function(m) {
    if (m.type === 'sys') {
      return '<div class="msg sys"><div class="sys-bubble">' + esc(m.text) + '</div></div>';
    }
    var isDJ = m.type === 'dj';
    var initials = m.name.slice(0,2).toUpperCase();
    return '<div class="msg ' + (isDJ ? 'dj' : '') + '">' +
      '<div class="avatar ' + (isDJ ? 'av-dj' : 'av-guest') + '">' + initials + '</div>' +
      '<div class="bubble-wrap">' +
        '<div class="bubble-name">' + esc(m.name) + '</div>' +
        '<div class="bubble ' + (isDJ ? 'bubble-dj' : 'bubble-guest') + '">' + esc(m.text).replace(/\n/g,'<br>') + '</div>' +
        '<div class="bubble-time">' + m.time + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function scrollDown() {
  var el = document.getElementById('msgs');
  el.scrollTop = el.scrollHeight;
}

function clearChat() {
  if (!confirm('채팅을 지울까요?')) return;
  MSGS = [];
  renderMsgs();
  renderNP();
  NP = null;
}

function toggleDJ() {
  var p = document.getElementById('dj-panel');
  p.classList.toggle('open');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
