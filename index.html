
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>하루뮤직바 — Vibe Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
  }
  .header {
    background: #1a1a18;
    color: #f5f4f0;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title { font-size: 18px; font-weight: 500; letter-spacing: .02em; }
  .header-sub { font-size: 12px; color: #888780; margin-top: 2px; }
  .np-bar {
    background: #1a1a18;
    border-top: 0.5px solid #2e2e2c;
    padding: 12px 20px 16px;
  }
  .np-label {
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    color: #E24B4A; display: flex; align-items: center; gap: 5px; margin-bottom: 6px;
  }
  .np-dot { width: 7px; height: 7px; border-radius: 50%; background: #E24B4A; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
  .np-track { font-size: 17px; font-weight: 500; color: #f5f4f0; }
  .np-artist { font-size: 13px; color: #888780; margin-top: 2px; }
  .np-empty { font-size: 14px; color: #555; }
  .chat-wrap {
    max-width: 640px; margin: 0 auto;
    display: flex; flex-direction: column;
    height: calc(100vh - 148px);
  }
  .msgs {
    flex: 1; overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg { display: flex; gap: 8px; align-items: flex-end; }
  .msg.dj { flex-direction: row-reverse; }
  .msg.sys { justify-content: center; margin: 4px 0; }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; flex-shrink: 0;
  }
  .av-guest { background: #EEEDFE; color: #534AB7; }
  .av-dj { background: #1a1a18; color: #f5f4f0; border: 1px solid #555; }
  .bubble-wrap { max-width: 75%; }
  .bubble-name { font-size: 11px; color: #999; margin-bottom: 3px; }
  .msg.dj .bubble-name { text-align: right; }
  .bubble { padding: 10px 13px; font-size: 14px; line-height: 1.55; word-break: break-word; }
  .bubble-guest { background: #fff; color: #1a1a18; border-radius: 16px 16px 16px 4px; border: 0.5px solid #e5e3dc; }
  .bubble-dj { background: #1a1a18; color: #f5f4f0; border-radius: 16px 16px 4px 16px; }
  .bubble-time { font-size: 11px; color: #bbb; margin-top: 3px; }
  .msg.dj .bubble-time { text-align: right; }
  .sys-bubble { font-size: 12px; color: #888; background: #eeecea; padding: 4px 14px; border-radius: 20px; }
  .empty-chat {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #aaa; font-size: 14px; text-align: center; padding: 2rem; gap: 10px;
  }
  .input-area {
    background: #fff;
    border-top: 0.5px solid #e5e3dc;
    padding: 10px 14px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
  }
  .name-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .name-row input, .name-row select {
    padding: 7px 11px; font-size: 13px;
    border: 0.5px solid #d3d1c7; border-radius: 20px;
    background: #f5f4f0; color: #1a1a18; font-family: inherit;
  }
  .name-row input { flex: 1; }
  .name-row input:focus, .name-row select:focus { outline: none; border-color: #888; }
  .msg-row { display: flex; gap: 8px; align-items: flex-end; }
  .msg-row textarea {
    flex: 1; padding: 9px 13px; font-size: 14px;
    border: 0.5px solid #d3d1c7; border-radius: 20px;
    background: #f5f4f0; color: #1a1a18;
    font-family: inherit; resize: none; line-height: 1.5; max-height: 100px;
  }
  .msg-row textarea:focus { outline: none; border-color: #888; }
  .send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: #1a1a18; color: #f5f4f0;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .send-btn:active { opacity: .7; }
  .dj-panel {
    display: none; background: #111110;
    padding: 14px 16px; max-width: 640px; margin: 0 auto;
    border-top: 0.5px solid #2e2e2c;
  }
  .dj-panel.open { display: block; }
  .dj-panel-title { font-size: 11px; color: #E24B4A; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
  .dj-np-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .dj-np-row input {
    flex: 1; padding: 8px 10px; font-size: 13px;
    border: 0.5px solid #333; border-radius: 8px;
    background: #222220; color: #f5f4f0; font-family: inherit;
  }
  .dj-np-row input:focus { outline: none; border-color: #666; }
  .dj-btn {
    padding: 8px 14px; font-size: 13px;
    border: 0.5px solid #444; border-radius: 8px;
    background: transparent; color: #f5f4f0;
    cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .dj-btn:hover { background: #222; }
  .dj-btn.red { border-color: #E24B4A; color: #E24B4A; }
  .dj-btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .dj-toggle {
    position: fixed; bottom: 80px; right: 16px;
    width: 46px; height: 46px; border-radius: 50%;
    background: #1a1a18; border: 0.5px solid #444;
    cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .conn-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: #888; padding: 3px 10px;
    background: #2a2a28; border-radius: 20px;
  }
  .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
  .conn-dot.on { background: #1D9E75; }
  .toast {
    position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
    background: #1a1a18; color: #f5f4f0;
    padding: 8px 20px; border-radius: 20px; font-size: 13px;
    z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .loading {
    position: fixed; inset: 0; background: #1a1a18;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 300; gap: 12px;
  }
  .loading-title { font-size: 22px; font-weight: 500; color: #f5f4f0; letter-spacing: .03em; }
  .loading-sub { font-size: 13px; color: #666; }
  .spinner { width: 28px; height: 28px; border: 2px solid #333; border-top-color: #E24B4A; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-title">하루뮤직바</div>
  <div class="loading-sub">Hongdae · 연결 중...</div>
</div>

<div class="header">
  <div>
    <div class="header-title">하루뮤직바</div>
    <div class="header-sub">Hongdae · vibe chat</div>
  </div>
  <div class="conn-badge">
    <span class="conn-dot" id="conn-dot"></span>
    <span id="conn-txt">연결 중</span>
  </div>
</div>

<div class="np-bar">
  <div class="np-label"><span class="np-dot"></span> now playing</div>
  <div id="np-display" class="np-empty">—</div>
</div>

<div class="chat-wrap">
  <div class="msgs" id="msgs">
    <div class="empty-chat">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="16" stroke="#ccc" stroke-width="1.2"/>
        <circle cx="18" cy="18" r="5" fill="#ccc"/>
        <circle cx="18" cy="18" r="2" fill="#f5f4f0"/>
      </svg>
      <span>이 곡의 vibe를 남겨보세요</span>
    </div>
  </div>
  <div class="input-area">
    <div class="name-row">
      <input id="name-inp" placeholder="이름 또는 별칭" maxlength="20" />
      <select id="who-sel" onchange="onWho()">
        <option value="guest">손님</option>
        <option value="dj">DJ</option>
      </select>
    </div>
    <div class="msg-row">
      <textarea id="msg-inp" placeholder="이 곡의 vibe는..." rows="1"
        onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 8L14 2L9 14L7.5 9L2 8Z" fill="#f5f4f0"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="dj-panel" id="dj-panel">
  <div class="dj-panel-title">DJ 컨트롤</div>
  <div class="dj-np-row">
    <input id="dj-title" placeholder="곡명" />
    <input id="dj-artist" placeholder="아티스트" />
    <button class="dj-btn" onclick="setNP()">Set</button>
  </div>
  <div class="dj-btn-row">
    <button class="dj-btn red" onclick="clearChat()">채팅 초기화</button>
    <button class="dj-btn" onclick="toggleDJ()">닫기</button>
  </div>
</div>

<button class="dj-toggle" onclick="toggleDJ()">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
    <circle cx="10" cy="10" r="8" stroke="#f5f4f0" stroke-width="1.2"/>
    <circle cx="10" cy="10" r="3" fill="#f5f4f0"/>
    <circle cx="10" cy="10" r="1.2" fill="#1a1a18"/>
  </svg>
</button>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDyGqVWm9_WeNBnwr5qUlGJt3Ol4V2NGwc",
  authDomain: "haroo-music-bar.firebaseapp.com",
  databaseURL: "https://haroo-music-bar-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "haroo-music-bar",
  storageBucket: "haroo-music-bar.firebasestorage.app",
  messagingSenderId: "1093747106288",
  appId: "1:1093747106288:web:de507eb077e300ebc93d35"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const msgsRef = ref(db, 'vibe/messages');
const npRef   = ref(db, 'vibe/nowplaying');

function ts() {
  return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
};
window.onKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMsg(); }
};
window.onWho = function() {
  var who = document.getElementById('who-sel').value;
  var ni = document.getElementById('name-inp');
  var mi = document.getElementById('msg-inp');
  if (who === 'dj') {
    ni.value = 'DJ 하루';
    mi.placeholder = 'DJ 코멘트...';
  } else {
    if (ni.value === 'DJ 하루') ni.value = '';
    mi.placeholder = '이 곡의 vibe는...';
  }
};
window.toggleDJ = function() {
  document.getElementById('dj-panel').classList.toggle('open');
};

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

window.setNP = async function() {
  var title  = document.getElementById('dj-title').value.trim();
  var artist = document.getElementById('dj-artist').value.trim();
  if (!title || !artist) { showToast('곡명과 아티스트를 입력해주세요'); return; }
  await set(npRef, { title, artist, time: ts() });
  await push(msgsRef, { type:'sys', text:'Now playing: '+title+' — '+artist, time:ts() });
  document.getElementById('dj-title').value  = '';
  document.getElementById('dj-artist').value = '';
  showToast('곡이 설정됐어요!');
};

window.sendMsg = async function() {
  var who  = document.getElementById('who-sel').value;
  var name = document.getElementById('name-inp').value.trim() || (who==='dj'?'DJ 하루':'손님');
  var text = document.getElementById('msg-inp').value.trim();
  if (!text) return;
  await push(msgsRef, { type:who, name, text, time:ts() });
  document.getElementById('msg-inp').value = '';
  document.getElementById('msg-inp').style.height = 'auto';
};

window.clearChat = async function() {
  if (!confirm('채팅을 모두 지울까요?')) return;
  await remove(msgsRef);
  await remove(npRef);
  showToast('초기화됐어요');
};

function renderNP(np) {
  var el = document.getElementById('np-display');
  if (!np) {
    el.className = 'np-empty';
    el.innerHTML = '—';
  } else {
    el.className = '';
    el.innerHTML = '<div class="np-track">'+esc(np.title)+'</div>'
                 + '<div class="np-artist">'+esc(np.artist)+'</div>';
  }
}

function renderMsgs(msgs) {
  var el = document.getElementById('msgs');
  if (!msgs || !Object.keys(msgs).length) {
    el.innerHTML = '<div class="empty-chat"><svg width="36" height="36" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="16" stroke="#ccc" stroke-width="1.2"/><circle cx="18" cy="18" r="5" fill="#ccc"/><circle cx="18" cy="18" r="2" fill="#f5f4f0"/></svg><span>이 곡의 vibe를 남겨보세요</span></div>';
    return;
  }
  var arr = Object.values(msgs);
  el.innerHTML = arr.map(function(m) {
    if (m.type === 'sys') {
      return '<div class="msg sys"><div class="sys-bubble">'+esc(m.text)+'</div></div>';
    }
    var isDJ = m.type === 'dj';
    var initials = (m.name||'?').slice(0,2).toUpperCase();
    return '<div class="msg '+(isDJ?'dj':'')+'">'
      +'<div class="avatar '+(isDJ?'av-dj':'av-guest')+'">'+initials+'</div>'
      +'<div class="bubble-wrap">'
        +'<div class="bubble-name">'+esc(m.name)+'</div>'
        +'<div class="bubble '+(isDJ?'bubble-dj':'bubble-guest')+'">'+esc(m.text).replace(/\n/g,'<br>')+'</div>'
        +'<div class="bubble-time">'+esc(m.time)+'</div>'
      +'</div>'
    +'</div>';
  }).join('');
  el.scrollTop = el.scrollHeight;
}

var firstLoad = true;

onValue(npRef, function(snap) {
  renderNP(snap.val());
});

onValue(msgsRef, function(snap) {
  renderMsgs(snap.val());
  if (firstLoad) {
    firstLoad = false;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('conn-dot').classList.add('on');
    document.getElementById('conn-txt').textContent = '연결됨';
  }
});

setTimeout(function(){
  if (firstLoad) {
    document.getElementById('loading').style.display = 'none';
    showToast('연결 실패 — 새로고침 해보세요');
  }
}, 8000);
</script>
</body>
</html>
